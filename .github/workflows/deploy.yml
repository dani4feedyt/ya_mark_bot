name: Deploy ya_mark_bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
            path: /mnt/Pull1/Scripts/ya_mark_bot
            clean: false

      - name: Rebuild and restart container
        run: |
            cd /mnt/Pull1/Scripts/ya_mark_bot
            sudo docker compose down
            sudo docker compose up -d --build
