name: Deploy ya_mark_bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to production folder
        env:
          SUDO_PASS: ${{ secrets.SUDO_PASSWORD }}
        run: |
          # Pass the secret into sudo -S to bypass the terminal prompt
          echo "$SUDO_PASS" | sudo -S mkdir -p /mnt/Pull1/Scripts/ya_mark_bot
          
          echo "$SUDO_PASS" | sudo -S rsync -av --delete \
            --exclude='.git/' \
            --exclude='.env' \
            --exclude='lang.yaml' \
            ./ /mnt/Pull1/Scripts/ya_mark_bot/

      - name: Rebuild and restart container
        env:
          SUDO_PASS: ${{ secrets.SUDO_PASSWORD }}
        run: |
          cd /mnt/Pull1/Scripts/ya_mark_bot
          echo "$SUDO_PASS" | sudo -S docker compose down
          echo "$SUDO_PASS" | sudo -S docker compose up -d --build
